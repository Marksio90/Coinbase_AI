services:
  postgres:
    image: postgres:16
    container_name: trade-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: tradingpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: trade-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  market-gateway:
    build: ./services/market-gateway
    container_name: market-gateway
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
      - postgres

  strategy-engine:
    build: ./services/strategy-engine
    container_name: strategy-engine
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
      - postgres

  risk-engine:
    build: ./services/risk-engine
    container_name: risk-engine
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
      - postgres

  execution-engine:
    build: ./services/execution-engine
    container_name: execution-engine
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
      - postgres

  orchestrator:
    build: ./services/orchestrator
    container_name: orchestrator
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
      - postgres

  ai-market-analyst:
    build: ./services/ai-market-analyst
    container_name: ai-market-analyst
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
      - postgres

  ai-news-risk:
    build: ./services/ai-news-risk
    container_name: ai-news-risk
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
      - postgres

  ai-regime-detector:
    build: ./services/ai-regime-detector
    container_name: ai-regime-detector
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
      - postgres

  supervisor:
    build: ./services/supervisor
    container_name: supervisor
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
      - postgres

  api:
    build: ./services/api
    container_name: trade-api
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  dashboard:
    build: ./services/dashboard
    container_name: trade-dashboard
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
    ports:
      - "8501:8501"

volumes:
  postgres_data:
